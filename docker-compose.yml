services:

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ttu_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

  backend:
    build:
      context: ./vectors
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./vectors/.env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
    volumes:
      - static_images:/app/static/images
      - model_cache:/root/.cache
      - ./vectors/logs:/app/logs
    depends_on:
      - qdrant
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./chatbot-app
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_storage:      # Qdrant vector data — persists between restarts
  static_images:       # Extracted KB images served by backend
  model_cache:         # HuggingFace + fastembed model cache
  redis_data:          # Redis AOF persistence
